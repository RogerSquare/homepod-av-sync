<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; width: 210px; padding: 12px;
      font: 13px/1.4 system-ui, sans-serif; color: #eaeaea;
      background: #16161a;
    }
    h1 { font-size: 13px; font-weight: 600; margin: 0 0 10px; }
    .delay { text-align: center; font-size: 20px; margin: 2px 0 8px; }
    .row { display: flex; gap: 5px; margin-bottom: 6px; }
    button {
      flex: 1; cursor: pointer; padding: 6px 0;
      background: #2c2c34; color: #eaeaea;
      border: 1px solid #44444e; border-radius: 6px; font: 12px system-ui;
    }
    button:hover { background: #363640; }
    .statusrow {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; box-sizing: border-box; padding: 7px 9px; margin-top: 6px;
      background: #26262e; border: 1px solid #44444e; border-radius: 6px;
      cursor: pointer; font: 12px system-ui;
    }
    .statusrow:hover { background: #30303a; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #666; flex: 0 0 auto; }
    .hint { font-size: 10px; color: #9a9aa4; margin-top: 8px; }
    .devhead { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 6px; }
    .devname { flex: 1 1 auto; min-width: 0; font-size: 11px; color: #cfcfd6;
               overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .devhead button { flex: 0 0 auto; width: auto; padding: 4px 9px; }
    #devList { margin-top: 5px; display: none; }
    .devitem {
      width: 100%; box-sizing: border-box; text-align: left; padding: 6px 8px; margin-top: 4px;
      background: #2c2c34; border: 1px solid #44444e; border-radius: 6px; cursor: pointer;
      font: 11px system-ui; color: #eaeaea;
    }
    .devitem:hover { background: #363640; }
    .devitem .sub { color: #9a9aa4; font-size: 10px; }
    .devitem.sel { border-color: #36c46a; }
  </style>
</head>
<body>
  <h1>HomePod Sync</h1>
  <div class="delay"><span id="delay">2.50</span> s delay</div>
  <div class="row">
    <button data-d="-250">-250</button>
    <button data-d="-50">-50</button>
    <button data-d="50">+50</button>
    <button data-d="250">+250</button>
  </div>
  <div class="statusrow" id="syncRow"><span>Sync</span><span class="dot" id="syncDot"></span></div>
  <div class="statusrow" id="hpRow"><span>HomePod</span><span class="dot" id="hpDot"></span></div>
  <div class="devhead">
    <span class="devname" id="devName">Device: default</span>
    <button id="scanBtn">Scan</button>
  </div>
  <div id="devList"></div>
  <div class="devhead">
    <span class="devname" id="audioName">Audio: default</span>
    <button id="audioBtn">Audio</button>
  </div>
  <div id="audioList"></div>
  <div class="devhead">
    <span class="devname" id="siteName">site…</span>
    <button id="siteBtn">Disable here</button>
  </div>
  <div class="hint" id="hint">Tune until lips match the HomePod.</div>
  <script src="popup.js"></script>
</body>
</html>
